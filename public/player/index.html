<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Small Hours — Lobby</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    :root {
      --bg: #0f0f23;
      --surface: #1a1a3e;
      --surface-alt: #252549;
      --text: #f5f5f7;
      --text-dim: #b0b0c0;
      --accent: #ff8906;
      --accent-glow: rgba(255, 137, 6, 0.2);
      --neon: #00eaff;
      --neon-glow: rgba(0, 234, 255, 0.2);
      --ready: #4ade80;
      --ready-glow: rgba(74, 222, 128, 0.2);
      --radius: 16px;
      --radius-lg: 24px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 40px 100px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      position: fixed;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* HEADER */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .header {
      padding: max(1rem, env(safe-area-inset-top)) clamp(1rem, 5vw, 1.5rem) 1rem;
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-alt) 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex: 0 1 auto;
    }

    .player-name {
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
    }

    .header-center {
      flex: 1;
      text-align: center;
      min-width: 80px;
    }

    .room-code {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 20px var(--accent-glow);
    }

    .header-right {
      display: flex;
      gap: 0.5rem;
      flex: 0 1 auto;
    }

    .leave-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--text-dim);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .leave-btn:active {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(0.95);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* MAIN CONTENT */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      padding: clamp(1rem, 5vw, 1.5rem);
      gap: 2rem;
    }

    .content::-webkit-scrollbar {
      width: 4px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    /* ─ Section: Players ─ */
    .section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-title {
      font-size: clamp(1rem, 4vw, 1.1rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding-left: 0.25rem;
    }

    .player-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(80px, 25vw, 100px), 1fr));
      gap: 1rem;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: default;
    }

    .player-card.ready {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.1), rgba(74, 222, 128, 0.05));
      border-color: rgba(74, 222, 128, 0.3);
    }

    .player-avatar {
      width: clamp(48px, 12vw, 64px);
      height: clamp(48px, 12vw, 64px);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      font-size: clamp(1.5rem, 8vw, 2rem);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      position: relative;
      box-shadow: 0 0 20px rgba(255, 137, 6, 0.15);
    }

    .player-card.ready .player-avatar {
      box-shadow: 0 0 20px var(--ready-glow);
    }

    .admin-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      box-shadow: 0 0 12px rgba(255, 137, 6, 0.5);
    }

    .player-name-card {
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      font-weight: 700;
      text-align: center;
      word-break: break-word;
      width: 100%;
    }

    .ready-indicator {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .ready-indicator.active {
      background: var(--ready);
      box-shadow: 0 0 12px var(--ready-glow);
    }

    /* ─ Section: Game Voting ─ */
    .game-voting {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .game-chips {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(140px, 40vw, 180px), 1fr));
      gap: 0.75rem;
    }

    .game-chip {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
      text-align: left;
    }

    .game-chip:active {
      transform: scale(0.97);
    }

    .game-chip-icon {
      font-size: clamp(2rem, 8vw, 2.5rem);
      line-height: 1;
    }

    .game-chip-name {
      font-size: clamp(0.9rem, 3vw, 1rem);
      font-weight: 700;
      color: var(--text);
    }

    .game-chip-desc {
      font-size: clamp(0.72rem, 2.5vw, 0.8rem);
      color: var(--text-dim);
      line-height: 1.35;
    }

    .game-chip.voted {
      background: linear-gradient(135deg, rgba(255, 137, 6, 0.2), rgba(0, 234, 255, 0.1));
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .vote-count {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      min-width: 20px;
      height: 20px;
      padding: 0 0.4rem;
      background: var(--accent);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─ Section: Chat ─ */
    .chat-section {
      margin-bottom: 2rem;
    }

    .chat-preview {
      padding: clamp(0.75rem, 3vw, 1rem);
      background: rgba(0, 234, 255, 0.05);
      border: 1px solid rgba(0, 234, 255, 0.2);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .chat-preview:active {
      background: rgba(0, 234, 255, 0.08);
    }

    .chat-preview-text {
      font-size: clamp(0.85rem, 3vw, 0.95rem);
      color: var(--text-dim);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chat-preview-icon {
      font-size: 1.2rem;
      opacity: 0.6;
      transition: transform 0.2s;
    }

    .chat-preview.expanded .chat-preview-icon {
      transform: rotate(180deg);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* CHAT PANEL (DRAWER) */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .chat-drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      border-top-left-radius: var(--radius-lg);
      border-top-right-radius: var(--radius-lg);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }

    .chat-drawer.expanded {
      max-height: 60vh;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: clamp(1rem, 3vw, 1.25rem);
      min-height: 0;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .chat-message {
      display: flex;
      gap: 0.75rem;
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chat-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .chat-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .chat-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .chat-username {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .chat-time {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .chat-text {
      font-size: 0.9rem;
      color: var(--text);
      word-break: break-word;
      line-height: 1.4;
    }

    .chat-input-section {
      padding: clamp(0.75rem, 3vw, 1rem);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .chat-input-wrapper {
      flex: 1;
      display: flex;
      gap: 0.5rem;
      min-width: 0;
    }

    #chat-input {
      flex: 1;
      min-width: 0;
      padding: clamp(0.75rem, 2vw, 0.9rem);
      font-size: clamp(0.9rem, 3vw, 1rem);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
    }

    #chat-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    #chat-input::placeholder {
      color: var(--text-dim);
    }

    .chat-send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(255, 137, 6, 0.3);
    }

    .chat-send:active {
      transform: scale(0.95);
    }

    .chat-send:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .rate-limit-msg {
      font-size: 0.75rem;
      color: #ff6b35;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      background: rgba(255, 107, 53, 0.1);
      border-radius: 8px;
      text-align: center;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* BOTTOM ACTION BAR */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .action-bar {
      padding: 1rem clamp(1rem, 5vw, 1.5rem) max(1rem, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, var(--surface));
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 20;
      justify-content: center;
    }

    .ready-btn {
      min-width: clamp(150px, 50vw, 200px);
      height: 56px;
      padding: 0 clamp(1.5rem, 4vw, 2rem);
      font-size: clamp(1rem, 3vw, 1.15rem);
      font-weight: 900;
      letter-spacing: 0.03em;
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(255, 137, 6, 0.3);
      position: relative;
      overflow: hidden;
    }

    .ready-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .ready-btn:active::before {
      transform: translateX(100%);
    }

    .ready-btn:active {
      transform: scale(0.97);
    }

    .ready-btn.ready {
      background: linear-gradient(135deg, var(--ready), #22c55e);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* WAITING STATE */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .waiting-state {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--text-dim);
    }

    .waiting-spinner {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .waiting-text {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* RESPONSIVE ADJUSTMENTS */
    /* ═══════════════════════════════════════════════════════════════════════ */
    @media (min-width: 600px) {
      .player-list {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }

      .game-chips {
        grid-template-columns: repeat(3, 1fr);
      }

      .chat-drawer.expanded {
        max-height: 50vh;
      }
    }

    @media (min-width: 900px) {
      .content {
        padding: 2rem;
      }

      .player-list {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1.5rem;
      }

      .action-bar {
        padding: 1.5rem 2rem max(1.5rem, env(safe-area-inset-bottom));
      }

      .ready-btn {
        min-width: 240px;
        height: 64px;
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- USERNAME ENTRY OVERLAY -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="username-overlay" style="
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  ">
    <div style="
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    ">
      <div style="text-align: center;">
        <div style="
          font-size: 3rem;
          margin-bottom: 1rem;
        ">🎮</div>
        <h2 style="
          font-size: 1.4rem;
          font-weight: 700;
          margin: 0;
          color: var(--text);
        ">What's your name?</h2>
      </div>
      <input
        id="username-input"
        type="text"
        placeholder="Enter your username..."
        style="
          padding: 1rem;
          font-size: 1rem;
          background: rgba(255, 255, 255, 0.06);
          border: 1px solid rgba(255, 255, 255, 0.12);
          border-radius: 12px;
          color: var(--text);
          outline: none;
          transition: all 0.2s;
        "
        maxlength="30"
      >
      <button
        id="username-submit"
        style="
          padding: 1rem;
          font-size: 1.1rem;
          font-weight: 700;
          background: linear-gradient(135deg, var(--accent), #ff6b35);
          border: none;
          border-radius: 12px;
          color: white;
          cursor: pointer;
          transition: all 0.2s;
          box-shadow: 0 8px 24px rgba(255, 137, 6, 0.3);
        "
      >Join Room</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- HEADER -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="header">
    <div class="header-left">
      <div class="player-name" id="player-name">Loading...</div>
    </div>
    <div class="header-center">
      <div class="room-code" id="room-code">XXXX</div>
    </div>
    <div class="header-right">
      <button class="leave-btn" id="leave-btn" title="Leave room">✕</button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- MAIN CONTENT -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="main">
    <div class="content">
      <!-- Players Section -->
      <div class="section">
        <div class="section-title" id="players-title">Players</div>
        <div class="player-list" id="player-list">
          <div class="waiting-state">
            <div class="waiting-spinner">⏳</div>
            <div class="waiting-text">Waiting for players...</div>
          </div>
        </div>
      </div>

      <!-- Game Voting Section -->
      <div class="game-voting" id="game-voting" style="display: none;">
        <div class="section-title">Suggest a game</div>
        <div class="game-chips" id="game-chips"></div>
      </div>

      <!-- Chat Section -->
      <div class="chat-section">
        <div class="chat-preview" id="chat-toggle">
          <span class="chat-preview-text">💬 View messages</span>
          <span class="chat-preview-icon">⌄</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- CHAT DRAWER -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="chat-drawer" id="chat-drawer">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-section">
      <div class="chat-input-wrapper">
        <input
          id="chat-input"
          type="text"
          placeholder="Say something..."
          maxlength="200"
          autocomplete="off"
        >
        <button class="chat-send" id="chat-send" title="Send message">⬆</button>
      </div>
      <div class="rate-limit-msg" id="rate-limit-msg" style="display: none;"></div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- ACTION BAR -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="action-bar">
    <button class="ready-btn" id="ready-btn">I'm Ready</button>
    <button class="ready-btn" id="start-game-btn" style="display: none; background: linear-gradient(135deg, var(--neon), #00bcd4);">Start Game</button>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <script src="/shared/sounds.js"></script>
  <script src="/shared/utils.js"></script>
  <script>
    'use strict';

    // ─── Configuration ──────────────────────────────────────────────
    const GAMES = ['quiz', 'shithead', 'spy', 'lyrics', 'cah', 'guess'];
    const GAME_LABELS = {
      quiz: '🧠 Quiz',
      shithead: '🎴 Shithead',
      spy: '🕵️ Spy',
      lyrics: '🎵 Lyrics',
      cah: '😂 CAH',
      guess: '🎲 Guess'
    };

    const GAME_ICONS = {
      quiz: '🧠',
      shithead: '🎴',
      spy: '🕵️',
      lyrics: '🎵',
      cah: '😂',
      guess: '🎲'
    };

    const GAME_NAMES = {
      quiz: 'Quiz',
      shithead: 'Shithead',
      spy: 'Spy',
      lyrics: 'Lyrics',
      cah: 'CAH',
      guess: 'Guess'
    };

    const GAME_DESCRIPTIONS = {
      quiz: 'Answer trivia questions. Use power-ups to crush the competition.',
      shithead: 'Be the first to empty your hand. Fast-paced card game.',
      spy: 'One player is the spy. Can they blend in before being caught?',
      lyrics: 'Guess the song from lyrics. How well do you know your music?',
      cah: 'Fill in the funniest blank. Adults only.',
      guess: 'Guess the secret number. Closest guess wins each round.'
    };

    // ─── State ──────────────────────────────────────────────────────
    let roomCode = '';
    let username = '';
    let myWs = null;
    let myReady = false;
    let selectedGame = null;
    let lobbyState = {
      players: [],
      admin: null,
      gameSuggestions: {},
      readyCount: 0,
      totalCount: 0,
      allReady: false,
      chatHistory: []
    };
    let rateLimitCooldown = 0;

    // ─── DOM Elements ──────────────────────────────────────────────
    const usernameOverlay = document.getElementById('username-overlay');
    const usernameInput = document.getElementById('username-input');
    const usernameSubmit = document.getElementById('username-submit');
    const roomCodeEl = document.getElementById('room-code');
    const playerNameEl = document.getElementById('player-name');
    const playerListEl = document.getElementById('player-list');
    const readyBtn = document.getElementById('ready-btn');
    const startGameBtn = document.getElementById('start-game-btn');
    const leaveBtn = document.getElementById('leave-btn');
    const gameChipsEl = document.getElementById('game-chips');
    const gameVotingEl = document.getElementById('game-voting');
    const chatToggle = document.getElementById('chat-toggle');
    const chatDrawer = document.getElementById('chat-drawer');
    const chatMessagesEl = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const rateLimitMsg = document.getElementById('rate-limit-msg');

    // ─── Initialization ────────────────────────────────────────────
    function init() {
      roomCode = GN.getRoomCode();

      if (!roomCode) {
        // No room code provided, redirect to landing page
        window.location.href = '/';
        return;
      }

      roomCodeEl.textContent = roomCode;

      // First, check if room exists or create it
      checkOrCreateRoom();
    }

    // ─── Check if room exists ────────────────────────────────────────
    async function checkOrCreateRoom() {
      try {
        const response = await fetch(`/api/rooms/${roomCode}`);
        const data = await response.json();

        if (!data.exists) {
          // Room doesn't exist - show error and redirect to landing
          console.log(`[Init] Room ${roomCode} not found`);
          GN.notify('Room not found. Redirecting to create a new room...', 'info', 3000);
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
          return;
        }

        // Room exists, proceed to username entry
        proceedToUsernameEntry();
      } catch (error) {
        console.error('[Init] Error checking room:', error);
        // Proceed anyway, let server handle it
        proceedToUsernameEntry();
      }
    }

    // ─── Show username entry and proceed ────────────────────────────
    function proceedToUsernameEntry() {
      // Check if username is already saved
      const savedUsername = sessionStorage.getItem(`gn-username-${roomCode}`);
      if (savedUsername) {
        username = savedUsername;
        playerNameEl.textContent = username;
        connectAndStartLobby();
      } else {
        // Show username entry overlay
        usernameOverlay.style.display = 'flex';
        usernameInput.focus();

        // Handle username submission
        const handleUsernameSubmit = () => {
          const inputName = usernameInput.value.trim();
          if (!inputName) return;

          username = inputName;
          sessionStorage.setItem(`gn-username-${roomCode}`, username);
          playerNameEl.textContent = username;
          usernameOverlay.style.display = 'none';

          connectAndStartLobby();
        };

        usernameSubmit.addEventListener('click', handleUsernameSubmit);
        usernameInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleUsernameSubmit();
        });
      }
    }

    // ─── Connect WebSocket and send JOIN_LOBBY ──────────────────────
    function connectAndStartLobby() {
      // Connect WebSocket
      myWs = GN.connectWebSocket(roomCode, 'player', onWsMessage);

      // Send JOIN_LOBBY once connected (check readyState to handle race condition)
      const sendJoinLobby = () => {
        if (myWs.readyState === WebSocket.OPEN) {
          myWs.send(JSON.stringify({ type: 'JOIN_LOBBY', username }));
        } else {
          myWs.addEventListener('open', () => {
            myWs.send(JSON.stringify({ type: 'JOIN_LOBBY', username }));
          });
        }
      };

      // Send immediately or on next open event
      setTimeout(sendJoinLobby, 10);

      // Event listeners
      readyBtn.addEventListener('click', handleReadyToggle);
      startGameBtn.addEventListener('click', handleStartGame);
      leaveBtn.addEventListener('click', handleLeave);
      chatToggle.addEventListener('click', toggleChatDrawer);
      chatSend.addEventListener('click', sendChatMessage);
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendChatMessage();
      });

      // Update rate limit display every 100ms
      setInterval(updateRateLimitDisplay, 100);

      // Auto-scroll chat to bottom on expand
      chatToggle.addEventListener('click', () => {
        setTimeout(() => scrollChatToBottom(), 50);
      });
    }

    // ─── WebSocket Message Handler ──────────────────────────────────
    function onWsMessage(msg) {
      if (msg.type === 'LOBBY_UPDATE') {
        // Update lobby state with new player/vote data
        lobbyState.players = msg.players || [];
        lobbyState.admin = msg.admin;
        lobbyState.readyCount = msg.readyCount || 0;
        lobbyState.totalCount = msg.totalCount || 0;
        lobbyState.gameSuggestions = msg.gameSuggestions || {};
        lobbyState.allReady = msg.allReady || false;
        renderLobbyState();
      } else if (msg.type === 'GAME_STATE' && msg.gameType && msg.phase && msg.phase !== 'LOBBY') {
        // Game has started, navigate to game page
        window.location.href = `/games/${msg.gameType}/?room=${roomCode}`;
      } else if (msg.type === 'CHAT_MESSAGE') {
        addChatMessage(msg);
      }
    }

    // ─── Ready Button ──────────────────────────────────────────────
    function handleReadyToggle() {
      myReady = !myReady;
      myWs.send(JSON.stringify({ type: 'SET_READY', ready: myReady }));
      updateReadyButton();
      GNSound.pop();
    }

    function updateReadyButton() {
      readyBtn.classList.toggle('ready', myReady);
      readyBtn.textContent = myReady ? '✓ Ready!' : 'I\'m Ready';
    }

    // ─── Leave Room ────────────────────────────────────────────────
    function handleLeave() {
      GNSound.wrong();
      window.location.href = '/';
    }

    // ─── Render Lobby State ────────────────────────────────────────
    function renderLobbyState() {
      // Update player list
      playerListEl.innerHTML = '';
      for (const player of lobbyState.players) {
        const playerEl = document.createElement('div');
        playerEl.className = 'player-card' + (player.isReady ? ' ready' : '');
        playerEl.innerHTML = `
          <div class="player-avatar">
            ${player.avatar}
            ${player.isAdmin ? '<div class="admin-badge">👑</div>' : ''}
          </div>
          <div class="player-name-card">${GN.esc(player.username)}</div>
          <div class="ready-indicator${player.isReady ? ' active' : ''}"></div>
        `;
        playerListEl.appendChild(playerEl);
      }

      // Update game voting chips
      gameChipsEl.innerHTML = '';
      for (const game of GAMES) {
        const count = lobbyState.gameSuggestions[game] || 0;
        const chip = document.createElement('button');
        chip.className = 'game-chip' + (selectedGame === game ? ' voted' : '');
        chip.innerHTML = `
          ${count > 0 ? `<span class="vote-count">${count}</span>` : ''}
          <span class="game-chip-icon">${GAME_ICONS[game]}</span>
          <span class="game-chip-name">${GAME_NAMES[game]}</span>
          <span class="game-chip-desc">${GAME_DESCRIPTIONS[game]}</span>
        `;
        chip.addEventListener('click', () => suggestGame(game));
        gameChipsEl.appendChild(chip);
      }

      gameVotingEl.style.display = lobbyState.totalCount > 1 ? 'flex' : 'none';

      // Update players count
      const countText = `Players (${lobbyState.readyCount}/${lobbyState.totalCount})`;
      document.getElementById('players-title').textContent = countText;

      // Show Start Game button if user is admin and a game is selected
      const isAdmin = lobbyState.admin === username;
      startGameBtn.style.display = (isAdmin && selectedGame) ? 'inline-block' : 'none';
    }

    // ─── Game Suggestion ────────────────────────────────────────────
    function suggestGame(gameType) {
      selectedGame = gameType;
      myWs.send(JSON.stringify({ type: 'SUGGEST_GAME', gameType }));
      renderLobbyState(); // Update to show selected game and Start button
      GNSound.select();
    }

    // ─── Start Game (Admin Only) ────────────────────────────────────
    function handleStartGame() {
      if (!selectedGame) return;
      myWs.send(JSON.stringify({ type: 'START_MINI_GAME', gameType: selectedGame }));
      GNSound.pop();
    }

    // ─── Chat Messages ──────────────────────────────────────────────
    function toggleChatDrawer() {
      chatDrawer.classList.toggle('expanded');
      chatToggle.classList.toggle('expanded');
      if (chatDrawer.classList.contains('expanded')) {
        scrollChatToBottom();
        chatInput.focus();
      }
    }

    function addChatMessage(msg) {
      const messageEl = document.createElement('div');
      messageEl.className = 'chat-message';

      const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      });

      messageEl.innerHTML = `
        <div class="chat-avatar">${msg.avatar}</div>
        <div class="chat-content">
          <div class="chat-header">
            <div class="chat-username">${GN.esc(msg.username)}</div>
            <div class="chat-time">${timeStr}</div>
          </div>
          <div class="chat-text">${GN.esc(msg.text)}</div>
        </div>
      `;

      chatMessagesEl.appendChild(messageEl);
      scrollChatToBottom();
    }

    function sendChatMessage() {
      const text = chatInput.value.trim();
      if (!text || rateLimitCooldown > 0) {
        if (rateLimitCooldown > 0) {
          GNSound.wrong();
        }
        return;
      }

      myWs.send(JSON.stringify({ type: 'CHAT_MESSAGE', text }));
      chatInput.value = '';
      rateLimitCooldown = 1; // Set cooldown
      chatSend.disabled = true;
      GNSound.pop();
    }

    function scrollChatToBottom() {
      chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
    }

    function updateRateLimitDisplay() {
      if (rateLimitCooldown > 0) {
        rateLimitCooldown -= 0.1;
        if (rateLimitCooldown <= 0) {
          rateLimitCooldown = 0;
          chatSend.disabled = false;
          rateLimitMsg.style.display = 'none';
        } else {
          const waitMs = Math.ceil(rateLimitCooldown * 1000);
          rateLimitMsg.style.display = 'block';
          rateLimitMsg.textContent = `Wait ${waitMs}ms before sending`;
        }
      }
    }

    // ─── Initialize on load ────────────────────────────────────────
    init();
  </script>
</body>
</html>
