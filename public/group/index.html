<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Night — Lobby</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 7rem;
      gap: 0.85rem;
      min-height: 100vh;
    }

    /* ── Name overlay ── */
    #name-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1.5rem;
    }
    #name-overlay.hidden { display: none; }
    .name-card {
      background: var(--card-solid);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      width: min(400px, 100%);
      display: flex; flex-direction: column;
      gap: 1.25rem; align-items: center;
      box-shadow: var(--shadow-card);
    }
    .name-card h2 {
      font-size: 1.6rem; font-weight: 900;
    }
    .name-card p { color: var(--text-dim); font-size: 0.9rem; text-align: center; }
    #name-input {
      width: 100%; padding: 1rem 1.25rem;
      font-size: 1.25rem; font-weight: 700;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    #name-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    #name-input::placeholder { color: var(--text-muted); }
    #name-error { color: var(--wrong); font-size: 0.85rem; min-height: 1em; }

    /* ── Header ── */
    #header {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.25rem 0;
    }
    .header-title {
      font-size: 1.15rem; font-weight: 900;
    }
    .header-right {
      display: flex; align-items: center; gap: 0.4rem;
    }
    .rules-link {
      text-decoration: none; color: var(--text-dim);
      font-size: 0.72rem; font-weight: 700;
      padding: 0.25rem 0.55rem; border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: color 0.2s, border-color 0.2s;
    }
    .rules-link:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .room-chip {
      background: linear-gradient(135deg, rgba(255,137,6,0.15), rgba(229,49,112,0.15));
      border: 1px solid rgba(255,137,6,0.3);
      border-radius: var(--radius-md);
      padding: 0.3rem 0.75rem;
      font-size: 1.1rem; font-weight: 900;
      letter-spacing: 0.2em;
      color: var(--accent);
    }

    /* ── Panel ── */
    .panel {
      width: 100%; max-width: 480px;
      background: var(--card); border-radius: var(--radius-lg);
      border: 1px solid rgba(255,255,255,0.04);
      padding: 1rem 1.1rem;
    }
    .panel-title {
      font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 0.6rem;
    }

    /* ── Players ── */
    #player-list { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .player-chip {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.7rem 0.4rem 0.45rem;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.06);
      font-size: 0.88rem; font-weight: 700;
      animation: bounceIn 0.4s var(--ease-out-back) both;
      position: relative;
    }
    .player-chip.me {
      border-color: rgba(255,137,6,0.4);
      background: rgba(255,137,6,0.08);
    }
    .player-chip.admin-chip {
      border-color: rgba(255,215,0,0.4);
      background: rgba(255,215,0,0.08);
    }
    .pc-avatar { font-size: 1.15rem; }
    .pc-name   { max-width: 7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pc-crown  { font-size: 0.85rem; }
    .pc-ready  { font-size: 0.85rem; margin-left: 0.1rem; }
    .pc-remove {
      margin-left: 0.1rem; background: none; border: none;
      color: var(--wrong); cursor: pointer; font-size: 0.82rem;
      padding: 0 0.1rem; opacity: 0.5; display: none;
    }
    .pc-remove:hover { opacity: 1; }
    .pc-remove.visible { display: inline; }

    /* ── Game grid ── */
    #game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .game-tile {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.3rem;
      padding: 1.1rem 0.75rem; min-height: 90px;
      background: rgba(255,255,255,0.03);
      border: 2px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      cursor: pointer; text-align: center;
      transition: all 0.2s var(--ease-out-back);
    }
    .game-tile:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .game-tile:active { transform: scale(0.96); }
    .game-tile.my-vote {
      background: rgba(255,137,6,0.12);
      border-color: rgba(255,137,6,0.5);
      box-shadow: 0 0 20px rgba(255,137,6,0.15);
    }
    .tile-emoji { font-size: 2rem; }
    .tile-label { font-size: 0.92rem; font-weight: 700; }
    .tile-min { font-size: 0.7rem; color: var(--text-dim); }
    .tile-votes {
      display: flex; align-items: center; gap: 0.2rem;
      background: rgba(255,137,6,0.2);
      border: 1px solid rgba(255,137,6,0.35);
      border-radius: var(--radius-pill);
      padding: 0.1rem 0.5rem; font-size: 0.72rem;
      font-weight: 800; color: var(--accent);
    }

    /* ── Vote status ── */
    #vote-section { width: 100%; max-width: 480px; }
    #vote-status-msg {
      font-size: 0.82rem; color: var(--text-muted);
      text-align: center; padding: 0.25rem 0;
    }
    #vote-status-msg.all-voted { color: var(--correct); font-weight: 700; }

    /* ── QR strip ── */
    #qr-strip {
      width: 100%; max-width: 480px;
      display: flex; align-items: center; gap: 0.75rem;
      background: rgba(127,90,240,0.06);
      border: 1px solid rgba(127,90,240,0.15);
      border-radius: var(--radius-lg);
      padding: 0.6rem 0.85rem;
    }
    #qr-strip img {
      width: 60px; height: 60px;
      border-radius: var(--radius-sm);
      background: #fff; padding: 3px; flex-shrink: 0;
    }
    #qr-join-url {
      flex: 1; min-width: 0;
      font-size: 0.72rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #copy-qr-btn {
      flex-shrink: 0; padding: 0.25rem 0.6rem;
      font-size: 0.75rem; font-weight: 700;
      background: rgba(127,90,240,0.15); color: var(--neon2);
      border: 1px solid rgba(127,90,240,0.3);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.2s;
    }
    #copy-qr-btn:hover { background: rgba(127,90,240,0.3); color: #fff; }

    /* ── Bottom actions ── */
    #actions {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(15, 14, 23, 0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 0.75rem 1rem 1rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.6rem;
      z-index: 50;
    }
    .ready-btn {
      width: min(460px, 100%); padding: 0.85rem;
      font-size: 1.1rem; font-weight: 700;
      background: rgba(255,255,255,0.04); color: var(--text-dim);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-md); cursor: pointer;
      transition: all 0.2s var(--ease-out-back);
    }
    .ready-btn.ready {
      background: rgba(44,182,125,0.12);
      border-color: var(--correct);
      color: var(--correct);
      box-shadow: 0 0 15px var(--correct-glow);
    }
    .ready-btn:active { transform: scale(0.97); }

    #start-section {
      width: min(460px, 100%);
      display: none; flex-direction: column; gap: 0.5rem;
    }
    #start-section.visible { display: flex; }

    .settings-row {
      display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center;
    }
    .settings-label { font-size: 0.76rem; color: var(--text-muted); white-space: nowrap; }
    .setting-btn {
      padding: 0.3rem 0.65rem; font-size: 0.8rem; font-weight: 700;
      background: rgba(255,255,255,0.04); color: var(--text-dim);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.15s;
    }
    .setting-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .setting-btn.active {
      background: rgba(255,137,6,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .diff-btn[data-diff="easy"].active   { background: rgba(19,104,206,0.2); color: #6ab0ff; border-color: #1368ce; }
    .diff-btn[data-diff="medium"].active { background: rgba(216,158,0,0.2);  color: #ffd166; border-color: #d89e00; }
    .diff-btn[data-diff="hard"].active   { background: rgba(226,27,60,0.2);  color: #ff7c96; border-color: #e21b3c; }

    .start-btn {
      width: 100%; padding: 0.9rem;
      font-size: 1.15rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none;
      border-radius: var(--radius-md); cursor: pointer;
      transition: all 0.2s var(--ease-out-back);
      box-shadow: 0 4px 15px rgba(255,137,6,0.3);
    }
    .start-btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    .start-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,137,6,0.4); }
    .start-btn:not(:disabled):active { transform: scale(0.97); }

    /* ── Reconnecting ── */
    #reconnecting {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem; z-index: 99;
    }
    #reconnecting.show { display: flex; }
    #reconnecting p { color: var(--text-dim); }

    .empty-state { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }
  </style>
</head>
<body class="bg-mesh">

<!-- Name overlay -->
<div id="name-overlay">
  <div class="name-card">
    <h2 class="gradient-text">Game Night</h2>
    <p>Enter your name to join the lobby</p>
    <input id="name-input" type="text" maxlength="20" placeholder="Your name"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-primary" id="name-submit-btn" style="width:100%">Join Lobby</button>
    <div id="name-error"></div>
  </div>
</div>

<!-- Reconnecting -->
<div id="reconnecting">
  <div class="spinner"></div>
  <p>Reconnecting...</p>
</div>

<!-- Header -->
<div id="header">
  <div class="header-title gradient-text">Game Night</div>
  <div class="header-right">
    <a id="rules-link" class="rules-link" href="/rules">Rules</a>
    <div class="room-chip" id="room-chip">----</div>
  </div>
</div>

<!-- Players -->
<div class="panel" id="players-panel">
  <div class="panel-title">Players (<span id="player-count">0</span>)</div>
  <div id="player-list">
    <span class="empty-state">Waiting for players...</span>
  </div>
</div>

<!-- Game grid -->
<div class="panel" id="game-panel">
  <div class="panel-title">Pick a Game</div>
  <div id="game-grid"></div>
</div>

<!-- Vote status -->
<div id="vote-section">
  <div id="vote-status-msg"></div>
</div>

<!-- QR strip -->
<div id="qr-strip">
  <img id="qr-img" src="" alt="QR">
  <div id="qr-join-url" class="gradient-text-alt">Loading...</div>
  <button id="copy-qr-btn">Copy</button>
</div>

<!-- Bottom actions -->
<div id="actions">
  <button class="ready-btn" id="ready-btn">I'm Ready</button>
  <div id="start-section">
    <div class="settings-row" id="difficulty-row">
      <span class="settings-label">Difficulty:</span>
      <button class="setting-btn diff-btn active" data-diff="easy">Easy</button>
      <button class="setting-btn diff-btn" data-diff="medium">Medium</button>
      <button class="setting-btn diff-btn" data-diff="hard">Hard</button>
    </div>
    <div class="settings-row" id="questions-row">
      <span class="settings-label">Questions:</span>
      <button class="setting-btn q-btn active" data-count="10">10</button>
      <button class="setting-btn q-btn" data-count="15">15</button>
      <button class="setting-btn q-btn" data-count="20">20</button>
      <button class="setting-btn q-btn" data-count="25">25</button>
    </div>
    <div class="settings-row" id="rounds-row">
      <span class="settings-label">Rounds:</span>
      <button class="setting-btn rounds-btn active" data-rounds="5">5</button>
      <button class="setting-btn rounds-btn" data-rounds="8">8</button>
      <button class="setting-btn rounds-btn" data-rounds="12">12</button>
      <button class="setting-btn rounds-btn" data-rounds="15">15</button>
    </div>
    <div class="settings-row" id="deck-count-row">
      <span class="settings-label">Decks:</span>
      <button class="setting-btn deck-btn active" data-decks="1">1 deck</button>
      <button class="setting-btn deck-btn" data-decks="2">2 decks</button>
      <button class="setting-btn deck-btn" data-decks="3">3 decks</button>
    </div>
    <button class="start-btn" id="start-btn" disabled>Start Game</button>
  </div>
</div>

<script src="/shared/sounds.js"></script>
<script src="/shared/confetti.js"></script>
<script src="/shared/utils.js"></script>
<script>
  const GAME_TILES = [
    { type: 'quiz',     emoji: '🧠', label: 'Quiz',                   available: true },
    { type: 'shithead', emoji: '🃏', label: 'Shithead',               available: true, minPlayers: 2 },
    { type: 'cah',      emoji: '🖤', label: 'Cards against Humanity', available: true, minPlayers: 3 },
    { type: 'spy',      emoji: '🕵️', label: 'Spy Game',              available: true, minPlayers: 3 },
  ];

  const roomCode    = GN.getRoomCode();
  const storageKey  = `gn-username-${roomCode}`;
  let myUsername    = sessionStorage.getItem(storageKey) || null;
  let isAdmin       = false;
  let isReady       = false;
  let myVote        = null;
  let lobbyState    = null;
  let ws, connectGen = 0;
  let selectedDifficulty    = 'easy';
  let selectedQuestionCount = 10;
  let selectedDeckCount     = 1;
  let selectedRoundCount    = 5;

  document.getElementById('room-chip').textContent = roomCode || '????';
  document.getElementById('rules-link').href =
    `/rules?room=${encodeURIComponent(roomCode || '')}&from=${encodeURIComponent(location.pathname)}`;

  // ── Name overlay ──────────────────────────────────────────────────────
  if (myUsername) {
    document.getElementById('name-overlay').classList.add('hidden');
    connect();
  }

  document.getElementById('name-submit-btn').addEventListener('click', submitName);
  document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitName(); });

  function submitName() {
    const val = document.getElementById('name-input').value.trim();
    if (!val) { document.getElementById('name-error').textContent = 'Please enter a name.'; return; }
    myUsername = val;
    sessionStorage.setItem(storageKey, myUsername);
    document.getElementById('name-overlay').classList.add('hidden');
    GNSound.join();
    GN.haptic('success');
    connect();
  }

  // ── WebSocket ─────────────────────────────────────────────────────────
  function connect() {
    const gen = ++connectGen;
    ws = new WebSocket(GN.buildWsUrl(roomCode, 'player'));
    document.getElementById('reconnecting').classList.remove('show');

    ws.addEventListener('open', () => {
      if (gen !== connectGen) return;
      send({ type: 'JOIN_LOBBY', username: myUsername });
    });
    ws.addEventListener('message', e => {
      if (gen !== connectGen) return;
      handleMsg(JSON.parse(e.data));
    });
    ws.addEventListener('close', () => {
      if (gen !== connectGen) return;
      if (myUsername) {
        document.getElementById('reconnecting').classList.add('show');
        setTimeout(connect, 2000);
      }
    });
    ws.addEventListener('error', () => ws.close());
  }

  function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }

  // ── Message handler ───────────────────────────────────────────────────
  function handleMsg(msg) {
    switch (msg.type) {
      case 'CONNECTED':
        document.getElementById('reconnecting').classList.remove('show');
        break;
      case 'JOIN_OK':
        myUsername = msg.username;
        isAdmin    = msg.isAdmin;
        sessionStorage.setItem(storageKey, myUsername);
        loadQR();
        updateJoinUrl();
        break;
      case 'LOBBY_UPDATE':
        lobbyState = msg;
        renderPlayers(msg);
        renderGameGrid(msg);
        renderVoteStatus(msg);
        updateStartSection(msg);
        break;
      case 'ADMIN_CHANGED':
        isAdmin = (msg.newAdmin === myUsername);
        updateStartSection(lobbyState);
        break;
      case 'MINI_GAME_STARTING':
        GNSound.whoosh();
        GN.haptic('heavy');
        window.location.href = msg.url;
        break;
      case 'PLAYER_REMOVED':
        if (msg.username === myUsername) {
          sessionStorage.removeItem(storageKey);
          window.location.href = '/?removed=1';
        }
        break;
      case 'ERROR':
        if (msg.code === 'ROOM_NOT_FOUND') window.location.href = '/';
        break;
      case 'RESTARTED':
        isReady = false;
        renderReadyBtn();
        break;
    }
  }

  // ── Render players ────────────────────────────────────────────────────
  function renderPlayers(state) {
    const list = document.getElementById('player-list');
    document.getElementById('player-count').textContent = state.totalCount;

    if (state.players.length === 0) {
      list.innerHTML = '<span class="empty-state">Waiting for players...</span>';
      return;
    }

    list.innerHTML = '';
    for (const p of state.players) {
      const chip = document.createElement('div');
      chip.className = 'player-chip' +
        (p.username === myUsername ? ' me' : '') +
        (p.isAdmin ? ' admin-chip' : '');
      chip.innerHTML =
        `<span class="pc-avatar">${GN.esc(p.avatar || '🙂')}</span>` +
        `<span class="pc-name">${GN.esc(p.username)}</span>` +
        (p.isAdmin ? `<span class="pc-crown">👑</span>` : '') +
        `<span class="pc-ready">${p.isReady ? '✅' : '⏳'}</span>` +
        `<button class="pc-remove${isAdmin && p.username !== myUsername ? ' visible' : ''}"
          data-name="${GN.esc(p.username)}" title="Remove">✕</button>`;
      list.appendChild(chip);
    }

    list.querySelectorAll('.pc-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        send({ type: 'REMOVE_PLAYER', username: btn.dataset.name });
      });
    });
  }

  // ── Render game grid ──────────────────────────────────────────────────
  function renderGameGrid(state) {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    for (const tile of GAME_TILES) {
      const votes = state.gameSuggestions[tile.type] || 0;
      const isMine = myVote === tile.type;
      const div = document.createElement('div');
      div.className = 'game-tile' + (isMine ? ' my-vote' : '');
      div.innerHTML =
        `<span class="tile-emoji">${tile.emoji}</span>` +
        `<span class="tile-label">${tile.label}</span>` +
        (tile.minPlayers ? `<span class="tile-min">Min: ${tile.minPlayers} players</span>` : '') +
        (votes > 0 ? `<span class="tile-votes">▲ ${votes}</span>` : '');
      if (tile.available) {
        div.addEventListener('click', () => {
          myVote = tile.type;
          GNSound.select();
          GN.haptic('light');
          send({ type: 'SUGGEST_GAME', gameType: tile.type });
          renderGameGrid(lobbyState || state);
          updateStartSection(lobbyState || state);
        });
      }
      grid.appendChild(div);
    }
  }

  // ── Render vote status ────────────────────────────────────────────────
  function renderVoteStatus(state) {
    const el = document.getElementById('vote-status-msg');
    if (state.totalCount === 0) { el.textContent = ''; return; }
    const readyCount = state.readyCount || 0;
    if (state.allReady) {
      el.textContent = `All ${state.totalCount} players ready`;
      el.className = 'all-voted';
    } else if (readyCount > 0) {
      el.textContent = `${readyCount} / ${state.totalCount} ready`;
      el.className = '';
    } else {
      el.textContent = '';
      el.className = '';
    }
  }

  // ── Ready button ──────────────────────────────────────────────────────
  const readyBtn = document.getElementById('ready-btn');
  readyBtn.addEventListener('click', () => {
    isReady = !isReady;
    if (isReady) { GNSound.ready(); GN.haptic('success'); }
    else { GNSound.tick(); GN.haptic('light'); }
    send({ type: 'SET_READY', ready: isReady });
    renderReadyBtn();
  });

  function renderReadyBtn() {
    readyBtn.textContent = isReady ? 'Ready!' : "I'm Ready";
    readyBtn.classList.toggle('ready', isReady);
  }

  // ── Start section ─────────────────────────────────────────────────────
  function updateStartSection(state) {
    if (!state) return;
    const section = document.getElementById('start-section');
    if (!isAdmin) { section.classList.remove('visible'); return; }
    section.classList.add('visible');
    const isQuiz     = myVote === 'quiz';
    const isShithead = myVote === 'shithead';
    const isCah      = myVote === 'cah';
    document.getElementById('difficulty-row').style.display  = isQuiz     ? '' : 'none';
    document.getElementById('questions-row').style.display   = isQuiz     ? '' : 'none';
    document.getElementById('deck-count-row').style.display  = isShithead ? '' : 'none';
    document.getElementById('rounds-row').style.display      = isCah      ? '' : 'none';
    const hasGame  = !!myVote;
    const allReady = state.allReady;
    const canStart = state.totalCount > 0 && allReady && hasGame;
    document.getElementById('start-btn').disabled = !canStart;
  }

  // ── Settings pickers ──────────────────────────────────────────────────
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDifficulty = btn.dataset.diff;
      GNSound.tick();
    });
  });
  document.querySelectorAll('.q-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedQuestionCount = Number(btn.dataset.count);
      GNSound.tick();
    });
  });
  document.querySelectorAll('.deck-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDeckCount = Number(btn.dataset.decks);
      GNSound.tick();
    });
  });
  document.querySelectorAll('.rounds-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rounds-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedRoundCount = Number(btn.dataset.rounds);
      GNSound.tick();
    });
  });

  // ── Start button ──────────────────────────────────────────────────────
  document.getElementById('start-btn').addEventListener('click', () => {
    if (!myVote) return;
    GNSound.countdownFinal();
    GN.haptic('heavy');
    if (myVote === 'shithead') {
      send({ type: 'START_MINI_GAME', gameType: 'shithead', deckCount: selectedDeckCount });
      return;
    }
    if (myVote === 'cah') {
      send({ type: 'START_MINI_GAME', gameType: 'cah', maxRounds: selectedRoundCount });
      return;
    }
    if (myVote === 'spy') {
      send({ type: 'START_MINI_GAME', gameType: 'spy' });
      return;
    }
    fetch('/api/categories').then(r => r.json()).then(cats => {
      send({
        type: 'START_MINI_GAME',
        gameType: myVote,
        categories: cats.map(c => c.id),
        questionCount: selectedQuestionCount,
        gameDifficulty: selectedDifficulty,
      });
    }).catch(() => {
      send({
        type: 'START_MINI_GAME',
        gameType: myVote,
        categories: [9],
        questionCount: selectedQuestionCount,
        gameDifficulty: selectedDifficulty,
      });
    });
  });

  // ── QR / Join URL ─────────────────────────────────────────────────────
  async function loadQR() {
    try {
      const res  = await fetch(`/api/qr?room=${roomCode}`);
      const svg  = await res.text();
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      document.getElementById('qr-img').src = URL.createObjectURL(blob);
    } catch (e) { console.warn('QR failed', e); }
  }

  function updateJoinUrl() {
    const url = `${location.protocol}//${location.hostname}${location.port ? ':' + location.port : ''}/group/${roomCode}`;
    document.getElementById('qr-join-url').textContent = url;
  }

  document.getElementById('copy-qr-btn').addEventListener('click', async () => {
    const url = document.getElementById('qr-join-url').textContent;
    try {
      await navigator.clipboard.writeText(url);
      const btn = document.getElementById('copy-qr-btn');
      btn.textContent = 'Copied!';
      GNSound.pop();
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    } catch (e) { /* unavailable */ }
  });

  updateJoinUrl();
</script>
</body>
</html>
