<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Small Hours — Host Display</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    :root {
      --bg: #0a0a18;
      --surface: #1a1a3e;
      --text: #ffffff;
      --text-dim: #d0d0e0;
      --accent: #ff8906;
      --accent-dark: #cc6a04;
      --neon: #00eaff;
      --neon-glow: rgba(0, 234, 255, 0.3);
      --ready: #4ade80;
      --ready-glow: rgba(74, 222, 128, 0.3);
      --shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
      --shadow-lg: 0 60px 150px rgba(0, 0, 0, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a0f3e 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* SCREEN MANAGEMENT */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .screen {
      display: none;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      overflow: hidden;
    }

    .screen.active {
      display: flex;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* LOBBY SCREEN */
    /* ═══════════════════════════════════════════════════════════════════════ */
    #lobby {
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(2rem, 8vh, 4rem);
      gap: 2rem;
    }

    .lobby-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .room-title {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .room-code {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 40px rgba(255, 137, 6, 0.3);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 137, 6, 0.2)); }
      50% { filter: drop-shadow(0 0 40px rgba(255, 137, 6, 0.4)); }
    }

    .subtitle {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ─ QR Panel ─ */
    .qr-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      background: linear-gradient(135deg, rgba(255, 137, 6, 0.08), rgba(0, 234, 255, 0.04));
      border: 2px solid var(--accent);
      border-radius: 32px;
      padding: clamp(2rem, 5vw, 3rem);
      box-shadow: 0 0 60px rgba(255, 137, 6, 0.2);
    }

    .qr-label {
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }

    .qr-code-container {
      background: white;
      padding: clamp(1.5rem, 4vw, 2rem);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .qr-code-container img {
      width: clamp(200px, 30vw, 400px);
      height: clamp(200px, 30vw, 400px);
      display: block;
      image-rendering: pixelated;
    }

    /* ─ Ready Status ─ */
    .ready-status {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: var(--ready);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 0 30px var(--ready-glow);
    }

    /* ─ Players Grid ─ */
    .players-section {
      width: 100%;
      max-width: 100%;
    }

    .players-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(clamp(120px, 20vw, 200px), 1fr));
      gap: clamp(1.5rem, 4vw, 2.5rem);
      justify-items: center;
    }

    .player-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.75rem, 2vw, 1.5rem);
      width: 100%;
    }

    .player-avatar {
      width: clamp(100px, 20vw, 180px);
      height: clamp(100px, 20vw, 180px);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      font-size: clamp(2.5rem, 10vw, 4.5rem);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 0 40px rgba(255, 137, 6, 0.3);
      position: relative;
    }

    .player-card.ready .player-avatar {
      box-shadow: 0 0 60px var(--ready-glow);
      border: 4px solid var(--ready);
    }

    .admin-crown {
      position: absolute;
      top: -10px;
      right: -10px;
      font-size: clamp(2rem, 8vw, 3.5rem);
      filter: drop-shadow(0 0 20px rgba(255, 137, 6, 0.5));
    }

    .player-name {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 700;
      text-align: center;
      max-width: 200px;
      word-break: break-word;
    }

    .ready-badge {
      font-size: clamp(0.9rem, 3vw, 1.3rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ready);
      text-shadow: 0 0 20px var(--ready-glow);
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* GAME SCREEN */
    /* ═══════════════════════════════════════════════════════════════════════ */
    #game-display {
      padding: clamp(2rem, 5vw, 3rem);
      overflow: auto;
    }

    .game-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 6vw, 4rem);
      color: var(--text-dim);
      text-align: center;
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* CHAT TICKER */
    /* ═══════════════════════════════════════════════════════════════════════ */
    .chat-ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.7));
      border-top: 2px solid var(--neon);
      padding: clamp(1rem, 3vw, 2rem);
      display: flex;
      gap: clamp(1rem, 3vw, 2rem);
      align-items: flex-end;
      min-height: clamp(120px, 20vh, 180px);
      z-index: 100;
      overflow: hidden;
    }

    .chat-messages-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: clamp(0.75rem, 2vw, 1.25rem);
      min-width: 0;
    }

    .chat-message {
      display: flex;
      gap: clamp(0.75rem, 2vw, 1.25rem);
      align-items: flex-start;
      padding: clamp(0.75rem, 2vw, 1.25rem);
      background: rgba(0, 234, 255, 0.08);
      border-left: 4px solid var(--neon);
      border-radius: 12px;
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chat-avatar {
      width: clamp(50px, 10vw, 80px);
      height: clamp(50px, 10vw, 80px);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--neon));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.3);
    }

    .chat-content {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: clamp(0.25rem, 1vw, 0.5rem);
    }

    .chat-username {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 800;
      color: var(--neon);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chat-text {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
    }

    /* ─ Chat Timer (removes old messages) ─ */
    .chat-timer {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--neon), transparent);
      animation: chatExpire 10s linear forwards;
    }

    @keyframes chatExpire {
      from { width: 100%; }
      to { width: 0%; }
    }

    /* ═══════════════════════════════════════════════════════════════════════ */
    /* RESPONSIVE ADJUSTMENTS */
    /* ═══════════════════════════════════════════════════════════════════════ */
    @media (max-width: 1024px) {
      #lobby {
        padding: clamp(1rem, 5vw, 2.5rem);
        gap: 1.5rem;
      }

      .players-grid {
        grid-template-columns: repeat(auto-fit, minmax(clamp(100px, 18vw, 140px), 1fr));
      }

      .chat-ticker {
        min-height: clamp(100px, 15vh, 140px);
        gap: clamp(0.75rem, 2vw, 1.5rem);
      }

      .chat-message {
        padding: clamp(0.5rem, 1.5vw, 1rem);
      }
    }
  </style>
</head>
<body>
  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- LOBBY SCREEN -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="lobby" class="screen active">
    <!-- Header: Room Code -->
    <div class="lobby-header">
      <div class="room-title">Small Hours</div>
      <div class="room-code" id="room-code">XXXX</div>
      <div class="subtitle">Join on your phone</div>
    </div>

    <!-- QR Code Panel -->
    <div class="qr-panel">
      <div class="qr-label">Scan to join</div>
      <div class="qr-code-container">
        <img id="qr-code" src="" alt="QR Code for joining room" />
      </div>
    </div>

    <!-- Players Grid -->
    <div class="players-section">
      <div class="players-title" id="players-title">Waiting for players...</div>
      <div class="players-grid" id="players-grid">
        <!-- Players dynamically inserted here -->
      </div>
    </div>

    <!-- Ready Status -->
    <div class="ready-status" id="ready-status">
      <!-- "✓ ALL READY!" or "Waiting for players..." -->
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- GAME DISPLAY SCREEN -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div id="game-display" class="screen">
    <div class="game-placeholder">
      Game display will render here
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- CHAT TICKER (ALWAYS VISIBLE) -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <div class="chat-ticker" id="chat-ticker">
    <div class="chat-messages-container" id="chat-messages"></div>
  </div>

  <!-- ════════════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS -->
  <!-- ════════════════════════════════════════════════════════════════ -->
  <script src="/shared/sounds.js"></script>
  <script src="/shared/utils.js"></script>
  <script>
    'use strict';

    // ─── Configuration ──────────────────────────────────────────────
    const MAX_CHAT_MESSAGES = 3;
    const CHAT_MESSAGE_LIFETIME = 10000; // 10 seconds

    // ─── State ──────────────────────────────────────────────────────
    let roomCode = '';
    let myWs = null;
    let lobbyState = {
      players: [],
      admin: null,
      readyCount: 0,
      totalCount: 0,
      allReady: false,
      activeMiniGame: 'lobby',
      chatHistory: []
    };
    let chatMessages = [];

    // ─── DOM Elements ──────────────────────────────────────────────
    const roomCodeEl = document.getElementById('room-code');
    const playersGrid = document.getElementById('players-grid');
    const readyStatus = document.getElementById('ready-status');
    const playersTitle = document.getElementById('players-title');
    const qrCode = document.getElementById('qr-code');
    const lobbyScreen = document.getElementById('lobby');
    const gameScreen = document.getElementById('game-display');
    const chatMessages_ = document.getElementById('chat-messages');

    // ─── QR Code Generation ──────────────────────────────────────────
    function generateQRCode(text) {
      const encoded = encodeURIComponent(text);
      return `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encoded}`;
    }

    // ─── Initialization ────────────────────────────────────────────
    function init() {
      roomCode = GN.getRoomCode();
      roomCodeEl.textContent = roomCode;

      // Generate QR code pointing to player join page
      const joinUrl = `${window.location.origin}/player/${roomCode}`;
      qrCode.src = generateQRCode(joinUrl);

      // Connect WebSocket
      myWs = GN.connectWebSocket(roomCode, 'display', onWsMessage);
    }

    // ─── WebSocket Message Handler ──────────────────────────────────
    function onWsMessage(msg) {
      if (msg.type === 'LOBBY_STATE') {
        lobbyState = msg;
        renderLobby();
      } else if (msg.type === 'GAME_STATE') {
        // Game has started, show game display (game will render via game-specific page)
        lobbyScreen.classList.remove('active');
        gameScreen.classList.add('active');
      } else if (msg.type === 'CHAT_MESSAGE') {
        addChatMessage(msg);
      }
    }

    // ─── Render Lobby State ──────────────────────────────────────────
    function renderLobby() {
      // Player grid
      playersGrid.innerHTML = '';
      for (const player of lobbyState.players) {
        const playerEl = document.createElement('div');
        playerEl.className = 'player-card' + (player.isReady ? ' ready' : '');

        const adminCrown = player.isAdmin ? `<div class="admin-crown">👑</div>` : '';
        const readyBadge = player.isReady ? `<div class="ready-badge">✓ Ready</div>` : '';

        playerEl.innerHTML = `
          <div class="player-avatar">
            ${player.avatar}
            ${adminCrown}
          </div>
          <div class="player-name">${GN.esc(player.username)}</div>
          ${readyBadge}
        `;
        playersGrid.appendChild(playerEl);
      }

      // Players title
      playersTitle.textContent = `Players (${lobbyState.readyCount}/${lobbyState.totalCount})`;

      // Ready status
      if (lobbyState.totalCount === 0) {
        readyStatus.textContent = '⏳ Waiting for players...';
      } else if (lobbyState.allReady) {
        readyStatus.textContent = '✓ All Ready!';
        GNSound.success();
      } else {
        readyStatus.textContent = `${lobbyState.readyCount}/${lobbyState.totalCount} ready`;
      }
    }

    // ─── Chat System ────────────────────────────────────────────────
    function addChatMessage(msg) {
      const messageId = `chat-${Date.now()}-${Math.random()}`;
      const messageEl = document.createElement('div');
      messageEl.className = 'chat-message';
      messageEl.id = messageId;

      messageEl.innerHTML = `
        <div class="chat-avatar">${msg.avatar}</div>
        <div class="chat-content">
          <div class="chat-username">${GN.esc(msg.username)}</div>
          <div class="chat-text">${GN.esc(msg.text)}</div>
        </div>
      `;

      chatMessages_.appendChild(messageEl);
      chatMessages.push({ id: messageId, el: messageEl, addedAt: Date.now() });

      // Keep only last 3 messages
      if (chatMessages.length > MAX_CHAT_MESSAGES) {
        const oldMsg = chatMessages.shift();
        oldMsg.el.remove();
      }

      // Auto-remove message after lifetime
      setTimeout(() => {
        const index = chatMessages.findIndex(m => m.id === messageId);
        if (index !== -1) {
          chatMessages.splice(index, 1);
          messageEl.remove();
        }
      }, CHAT_MESSAGE_LIFETIME);
    }

    // ─── Initialize on load ────────────────────────────────────────
    init();
  </script>
</body>
</html>
