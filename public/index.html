<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Night</title>
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem 1rem;
      position: relative;
    }

    /* Floating particles canvas */
    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .landing-card {
      position: relative;
      z-index: 1;
      background: rgba(26, 25, 50, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-xl);
      padding: 2.5rem 2rem;
      width: min(480px, calc(100vw - 2rem));
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 1.5rem;
      box-shadow: var(--shadow-card), 0 0 120px rgba(127, 90, 240, 0.08);
      overflow: hidden;
    }

    /* Glow ring around card */
    .landing-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(255, 137, 6, 0.15), transparent 40%, transparent 60%, rgba(0, 234, 255, 0.15));
      z-index: -1;
    }

    .hero { text-align: center; }
    .hero-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 0.5rem;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }
    .hero-title {
      font-size: clamp(2.6rem, 9vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .hero-sub {
      color: var(--text-dim);
      font-size: 1rem;
      margin-top: 0.3rem;
    }

    .create-btn {
      width: 100%;
      padding: 1.1rem;
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.15s var(--ease-out-back), box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 137, 6, 0.35);
      position: relative;
      overflow: hidden;
    }
    .create-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
      transform: rotate(45deg) translateX(-100%);
      transition: transform 0.6s;
    }
    .create-btn:hover::after { transform: rotate(45deg) translateX(100%); }
    .create-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255, 137, 6, 0.45); }
    .create-btn:active { transform: scale(0.97); }
    .create-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .tv-btn {
      width: 100%;
      padding: 0.9rem 1rem;
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--neon2), rgba(127, 90, 240, 0.7));
      color: #fff;
      border: 1px solid rgba(127, 90, 240, 0.3);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: transform 0.15s var(--ease-out-back), box-shadow 0.2s;
      box-shadow: 0 4px 15px var(--neon2-glow);
    }
    .tv-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--neon2-glow); }
    .tv-btn:active { transform: scale(0.97); }
    .tv-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    .join-row {
      width: 100%;
      display: flex;
      gap: 0.6rem;
    }
    #room-code-input {
      flex: 1;
      min-width: 0;
      padding: 0.9rem 1rem;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      text-align: center;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #room-code-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    #room-code-input::placeholder {
      color: var(--text-muted);
      letter-spacing: 0.1em;
      font-weight: 400;
      font-size: 1rem;
    }

    .join-btn {
      padding: 0.9rem 1.6rem;
      font-size: 1.15rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--correct), var(--neon));
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.12s var(--ease-out-back);
      box-shadow: 0 4px 15px var(--correct-glow);
    }
    .join-btn:hover { transform: translateY(-2px); }
    .join-btn:active { transform: scale(0.97); }

    #error-msg {
      color: var(--wrong);
      font-size: 0.88rem;
      font-weight: 600;
      min-height: 1.2em;
      text-align: center;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1rem;
      font-size: 0.78rem;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
  </style>
</head>
<body class="bg-mesh bg-noise">

<canvas id="particles"></canvas>

<div class="landing-card">
  <div class="hero">
    <div class="logo-container">
      <img src="/assets/logo.png" alt="small-hours games" class="hero-logo">
    </div>
    <div class="hero-icon">🎮</div>
    <div class="hero-title gradient-text">Game Night</div>
    <div class="hero-sub">Your living room, game show ready.</div>
  </div>

  <button class="create-btn" id="create-btn">Create Room</button>
  <button class="tv-btn" id="tv-btn">📺 Host on TV / Big Screen</button>

  <div class="divider">or join existing</div>

  <div class="join-row">
    <input id="room-code-input" type="text" maxlength="4" placeholder="Room code"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <button class="join-btn" id="join-btn">Join</button>
  </div>

  <div id="error-msg"></div>
</div>

<script src="/shared/sounds.js"></script>
<script>
  const createBtn = document.getElementById('create-btn');
  const tvBtn     = document.getElementById('tv-btn');
  const joinBtn   = document.getElementById('join-btn');
  const codeInput = document.getElementById('room-code-input');
  const errorMsg  = document.getElementById('error-msg');

  // ── Floating particles ─────────────────────────────────────────────────
  const pCanvas = document.getElementById('particles');
  const pCtx    = pCanvas.getContext('2d');
  let dots = [];

  function initParticles() {
    pCanvas.width  = window.innerWidth;
    pCanvas.height = window.innerHeight;
    dots = [];
    const count = Math.min(60, Math.floor(pCanvas.width * pCanvas.height / 15000));
    for (let i = 0; i < count; i++) {
      dots.push({
        x: Math.random() * pCanvas.width,
        y: Math.random() * pCanvas.height,
        r: 1 + Math.random() * 2,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        alpha: 0.15 + Math.random() * 0.35,
        color: ['#ff8906', '#00eaff', '#7f5af0', '#e53170'][Math.floor(Math.random() * 4)],
      });
    }
  }

  function drawParticles() {
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    for (const d of dots) {
      d.x += d.vx;
      d.y += d.vy;
      if (d.x < -10) d.x = pCanvas.width + 10;
      if (d.x > pCanvas.width + 10) d.x = -10;
      if (d.y < -10) d.y = pCanvas.height + 10;
      if (d.y > pCanvas.height + 10) d.y = -10;

      pCtx.beginPath();
      pCtx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      pCtx.fillStyle = d.color;
      pCtx.globalAlpha = d.alpha;
      pCtx.fill();
    }

    // Draw faint connections
    pCtx.globalAlpha = 0.04;
    pCtx.strokeStyle = '#7f5af0';
    pCtx.lineWidth = 0.5;
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x;
        const dy = dots[i].y - dots[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < 15000) {
          pCtx.beginPath();
          pCtx.moveTo(dots[i].x, dots[i].y);
          pCtx.lineTo(dots[j].x, dots[j].y);
          pCtx.stroke();
        }
      }
    }
    pCtx.globalAlpha = 1;
    requestAnimationFrame(drawParticles);
  }

  initParticles();
  drawParticles();
  window.addEventListener('resize', initParticles);

  // ── Removed message ────────────────────────────────────────────────────
  if (new URLSearchParams(location.search).get('removed') === '1') {
    errorMsg.textContent = 'You were removed from the room.';
  }

  // ── Input ──────────────────────────────────────────────────────────────
  codeInput.addEventListener('input', () => {
    const pos = codeInput.selectionStart;
    codeInput.value = codeInput.value.toUpperCase();
    codeInput.setSelectionRange(pos, pos);
  });
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

  // ── Create room ────────────────────────────────────────────────────────
  createBtn.addEventListener('click', async () => {
    GNSound.pop();
    createBtn.disabled = true;
    createBtn.textContent = 'Creating...';
    try {
      const res = await fetch('/api/rooms', { method: 'POST' });
      const { code } = await res.json();
      window.location.href = `/player/${code}`;
    } catch (e) {
      errorMsg.textContent = 'Could not create room. Try again.';
      createBtn.disabled = false;
      createBtn.textContent = 'Create Room';
    }
  });

  // ── TV button ──────────────────────────────────────────────────────────
  tvBtn.addEventListener('click', async () => {
    GNSound.pop();
    tvBtn.disabled = true;
    tvBtn.textContent = 'Creating...';
    try {
      const res = await fetch('/api/rooms', { method: 'POST' });
      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const { code } = await res.json();
      window.location.href = `/host/${code}`;
    } catch (e) {
      errorMsg.textContent = 'Could not create room. Try again.';
      tvBtn.disabled = false;
      tvBtn.textContent = '📺 Host on TV / Big Screen';
    }
  });

  // ── Join ───────────────────────────────────────────────────────────────
  joinBtn.addEventListener('click', doJoin);

  function doJoin() {
    const code = codeInput.value.trim().toUpperCase();
    if (!code || code.length !== 4) {
      errorMsg.textContent = 'Enter a 4-letter room code.';
      GNSound.wrong();
      return;
    }
    GNSound.select();
    errorMsg.textContent = '';
    window.location.href = `/group/${code}`;
  }
</script>
</body>
</html>
