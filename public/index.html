<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Night</title>
  <style>
    :root {
      --bg:     #1a1a2e;
      --card:   #16213e;
      --text:   #eaeaea;
      --accent: #9f44d3;
      --timer:  #00c2ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(159,68,211,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,194,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 60% 20%, rgba(74,144,217,0.14) 0%, transparent 50%);
      animation: meshDrift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes meshDrift {
      0%   { transform: translate(0,    0)    rotate(0deg); }
      33%  { transform: translate(2%,   -3%)  rotate(1.5deg); }
      66%  { transform: translate(-2%,  2%)   rotate(-1deg); }
      100% { transform: translate(1.5%, -1%)  rotate(0.5deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(22, 33, 62, 0.85);
      border: 1px solid rgba(159, 68, 211, 0.25);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      width: min(460px, calc(100vw - 2rem));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 48px rgba(0,0,0,0.45);
    }

    .title {
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      font-weight: 900;
      letter-spacing: -0.01em;
      background: linear-gradient(90deg, #9f44d3, #00c2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .subtitle {
      color: #aaa;
      font-size: 1rem;
      text-align: center;
      margin-top: -0.75rem;
    }

    .create-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #4a90d9);
      color: #fff;
      border: none;
      border-radius: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.12s, opacity 0.2s;
    }
    .create-btn:hover { opacity: 0.88; }
    .create-btn:active { transform: scale(0.97); }
    .create-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #444;
      font-size: 0.85rem;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .join-row {
      width: 100%;
      display: flex;
      gap: 0.6rem;
    }
    #room-code-input {
      flex: 1;
      padding: 0.85rem 1rem;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      text-align: center;
      text-transform: uppercase;
      background: var(--card);
      color: var(--text);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #room-code-input:focus { border-color: var(--accent); }
    #room-code-input::placeholder { color: #444; letter-spacing: 0.1em; font-weight: 400; font-size: 1rem; }

    .join-btn {
      padding: 0.85rem 1.4rem;
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #26890c, #00c2ff);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, opacity 0.2s;
    }
    .join-btn:hover { opacity: 0.88; }
    .join-btn:active { transform: scale(0.97); }

    #error-msg {
      color: #ff6b6b;
      font-size: 0.9rem;
      min-height: 1.2em;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="card">
  <div>
    <div class="title">🎮 Game Night</div>
    <div class="subtitle">Your living room, game show ready.</div>
  </div>

  <button class="create-btn" id="create-btn">Create Room</button>

  <div class="divider">or join existing</div>

  <div class="join-row">
    <input id="room-code-input" type="text" maxlength="4" placeholder="Room code" autocomplete="off"
      autocorrect="off" autocapitalize="characters" spellcheck="false">
    <button class="join-btn" id="join-btn">Join →</button>
  </div>

  <div id="error-msg"></div>
</div>

<script>
  const createBtn = document.getElementById('create-btn');
  const joinBtn   = document.getElementById('join-btn');
  const codeInput = document.getElementById('room-code-input');
  const errorMsg  = document.getElementById('error-msg');

  // Check if redirected after being removed
  if (new URLSearchParams(location.search).get('removed') === '1') {
    errorMsg.textContent = 'You were removed from the room.';
  }

  // Force uppercase
  codeInput.addEventListener('input', () => {
    const pos = codeInput.selectionStart;
    codeInput.value = codeInput.value.toUpperCase();
    codeInput.setSelectionRange(pos, pos);
  });
  codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });

  createBtn.addEventListener('click', async () => {
    createBtn.disabled = true;
    createBtn.textContent = 'Creating…';
    try {
      const res = await fetch('/api/rooms', { method: 'POST' });
      const { code } = await res.json();
      window.location.href = `/group/${code}`;
    } catch (e) {
      errorMsg.textContent = 'Could not create room. Try again.';
      createBtn.disabled = false;
      createBtn.textContent = 'Create Room';
    }
  });

  joinBtn.addEventListener('click', doJoin);

  function doJoin() {
    const code = codeInput.value.trim().toUpperCase();
    if (!code || code.length !== 4) {
      errorMsg.textContent = 'Enter a 4-letter room code.';
      return;
    }
    errorMsg.textContent = '';
    window.location.href = `/group/${code}`;
  }
</script>
</body>
</html>
