name: Bug Report
description: Report a bug or unexpected behaviour in Quiz-trivia
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "Example: The score does not update after a player answers correctly."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Start the server with `npm start`
        2. Open the host view and join with two players
        3. Start a game and answer a question
        4. See that scores are not updated
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node.js version, OS, browser, Docker or bare-metal?
      placeholder: "Node 20, Ubuntu 22.04, Chrome 124, bare-metal"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any server-side console output or browser console errors here.
    validations:
      required: false
