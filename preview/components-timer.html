<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; font-family: 'Outfit', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 16px; max-width: 500px; }

  /* Timer bar */
  .timer-wrap { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
  .timer-bar { height: 100%; border-radius: 3px; }
  .t-full  { background: linear-gradient(90deg, #39ff14, #4dc9f6); width: 100%; }
  .t-half  { background: linear-gradient(90deg, #39ff14, #4dc9f6); width: 55%; }
  .t-warn  { background: linear-gradient(90deg, #ff9f43, #ff4757); width: 30%; }
  .t-crit  { background: #ff4757; width: 10%; animation: pulse .5s ease-in-out infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .row { display: flex; align-items: center; gap: 12px; }
  .label { font-size: 0.8rem; color: #8888aa; min-width: 80px; }

  /* Connection status */
  .conn { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .dot  { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .connected    { background: rgba(57,255,20,0.15); color: #39ff14; border: 1px solid rgba(57,255,20,0.3); }
  .disconnected { background: rgba(255,71,87,0.15); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); }
  .reconnecting { background: rgba(255,159,67,0.15); color: #ff9f43; border: 1px solid rgba(255,159,67,0.3); }
</style>
</head>
<body>
  <div>
    <div class="row" style="margin-bottom:8px"><span class="label" style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:#8888aa">Timer Bar</span></div>
    <div class="row"><span class="label">Full</span><div class="timer-wrap" style="flex:1"><div class="timer-bar t-full"></div></div></div>
    <div style="height:6px"></div>
    <div class="row"><span class="label">50%</span><div class="timer-wrap" style="flex:1"><div class="timer-bar t-half"></div></div></div>
    <div style="height:6px"></div>
    <div class="row"><span class="label">Warning</span><div class="timer-wrap" style="flex:1"><div class="timer-bar t-warn"></div></div></div>
    <div style="height:6px"></div>
    <div class="row"><span class="label">Critical</span><div class="timer-wrap" style="flex:1"><div class="timer-bar t-crit"></div></div></div>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:4px">
    <div class="conn connected"><div class="dot"></div>Connected</div>
    <div class="conn reconnecting"><div class="dot"></div>Reconnecting (2)...</div>
    <div class="conn disconnected"><div class="dot"></div>Disconnected</div>
  </div>
</body>
</html>
