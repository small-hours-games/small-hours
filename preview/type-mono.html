<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; font-family: 'Outfit', sans-serif; color: #e0e0ff; padding: 24px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
  .room-code-large {
    font-family: 'Courier New', monospace;
    font-size: 5rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #b347d9;
    text-shadow: 0 0 10px rgba(179,71,217,0.5), 0 0 40px rgba(179,71,217,0.25), 0 0 80px rgba(179,71,217,0.1);
  }
  .room-code-sm {
    font-family: 'Courier New', monospace;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    color: #b347d9;
  }
  .meta { font-size: 10px; color: #8888aa; font-family: 'Courier New', monospace; text-align: center; }
</style>
</head>
<body>
  <div>
    <div class="room-code-large">ABCD</div>
    <div class="meta">Courier New · 900 · 5rem · letter-spacing 0.3em · neon purple glow — host display</div>
  </div>
  <div>
    <div class="room-code-sm">XYZW</div>
    <div class="meta">Courier New · 900 · 2rem · letter-spacing 0.3em — mobile / header</div>
  </div>
</body>
</html>
