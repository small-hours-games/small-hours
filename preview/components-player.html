<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; font-family: 'Outfit', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 8px; max-width: 400px; }
  .player-item {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    border-radius: 8px; background: rgba(255,255,255,0.03);
  }
  .player-item.ready { border: 1px solid rgba(57,255,20,0.3); background: rgba(57,255,20,0.05); }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(179,71,217,0.15); display: flex;
    align-items: center; justify-content: center; font-size: 1.3rem;
  }
  .name { flex: 1; font-weight: 600; color: #e0e0ff; font-size: 1rem; }
  .status-ready { color: #39ff14; font-size: 0.8rem; font-weight: 600; }
  .status-wait  { color: #8888aa; font-size: 0.8rem; }
  .score { font-weight: 700; color: #4dc9f6; font-size: 1.1rem; min-width: 40px; text-align: right; }
  .badge { font-size: 0.7rem; background: rgba(179,71,217,0.2); color: #b347d9; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
</style>
</head>
<body>
  <div class="player-item ready">
    <div class="avatar">🐸</div>
    <div style="flex:1">
      <div class="name">Alex <span class="badge">ADMIN</span></div>
      <div class="status-ready">Ready</div>
    </div>
    <div class="score">142</div>
  </div>
  <div class="player-item">
    <div class="avatar">🐱</div>
    <div style="flex:1">
      <div class="name">Jordan</div>
      <div class="status-wait">Not ready</div>
    </div>
    <div class="score">87</div>
  </div>
  <div class="player-item">
    <div class="avatar">🦄</div>
    <div style="flex:1">
      <div class="name">Sam</div>
      <div class="status-wait">Not ready</div>
    </div>
    <div class="score">64</div>
  </div>
  <div class="player-item">
    <div class="avatar">🐝</div>
    <div style="flex:1">
      <div class="name">Chris</div>
      <div class="status-ready">Ready</div>
    </div>
    <div class="score">55</div>
  </div>
</body>
</html>
