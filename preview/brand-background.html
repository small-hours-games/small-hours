<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; overflow: hidden; width: 700px; height: 150px; }
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 400px 300px at 20% 50%, rgba(179,71,217,0.12) 0%, transparent 100%),
      radial-gradient(ellipse 350px 250px at 80% 20%, rgba(77,201,246,0.09) 0%, transparent 100%),
      radial-gradient(ellipse 300px 200px at 50% 90%, rgba(255,110,199,0.06) 0%, transparent 100%),
      #0a0a1a;
    animation: bgFloat 15s ease-in-out infinite alternate;
  }
  @keyframes bgFloat {
    0%   { filter: hue-rotate(0deg); transform: scale(1); }
    50%  { filter: hue-rotate(15deg); transform: scale(1.05); }
    100% { filter: hue-rotate(-10deg); transform: scale(1); }
  }
  .particle { position: absolute; border-radius: 50%; animation: float linear infinite; opacity: 0; }
  @keyframes float {
    0%   { transform: translateY(200px); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.8; }
    100% { transform: translateY(-20px) translateX(20px); opacity: 0; }
  }
  .label { position: absolute; bottom: 10px; right: 14px; font-family: 'Courier New', monospace; font-size: 10px; color: rgba(136,136,170,0.5); }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="label">bgFloat · 15s · hue-rotate + scale</div>
  <script>
    const colors = ['#b347d9','#4dc9f6','#ff6ec7','#39ff14'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      const s = 1 + Math.random() * 2;
      p.style.width = p.style.height = s + 'px';
      p.style.background = colors[Math.floor(Math.random() * 4)];
      p.style.animationDuration = (8 + Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      document.body.appendChild(p);
    }
  </script>
</body>
</html>
