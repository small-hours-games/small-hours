<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; font-family: 'Outfit', sans-serif; padding: 20px; }
  .row { display: flex; gap: 10px; align-items: stretch; }
  .swatch { flex: 1; border-radius: 10px; overflow: hidden; }
  .color-block { height: 72px; display: flex; align-items: center; justify-content: center; }
  .label { padding: 6px 8px; background: rgba(20,20,40,0.9); }
  .name { font-size: 11px; font-weight: 600; color: #e0e0ff; }
  .hex  { font-size: 10px; color: #8888aa; font-family: monospace; }
  .card-demo { height: 72px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#e0e0ff; font-weight:600; border: 1px solid rgba(179,71,217,0.3); backdrop-filter: blur(12px); background: rgba(20,20,40,0.8); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#0a0a1a">
      <span style="color:#e0e0ff; font-size:11px; font-weight:600">Base</span>
    </div>
    <div class="label"><div class="name">BG Base</div><div class="hex">#0a0a1a</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#141428">
      <span style="color:#e0e0ff; font-size:11px; font-weight:600">Card</span>
    </div>
    <div class="label"><div class="name">BG Card</div><div class="hex">#141428</div></div>
  </div>
  <div class="swatch">
    <div class="card-demo" style="border-radius:10px 10px 0 0">Glass Card</div>
    <div class="label"><div class="name">Glass Surface</div><div class="hex">rgba(20,20,40,.8) + blur</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#e0e0ff">
      <span style="color:#0a0a1a; font-size:11px; font-weight:600">Primary Text</span>
    </div>
    <div class="label"><div class="name">Text Primary</div><div class="hex">#e0e0ff</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#8888aa">
      <span style="color:#0a0a1a; font-size:11px; font-weight:600">Secondary</span>
    </div>
    <div class="label"><div class="name">Text Secondary</div><div class="hex">#8888aa</div></div>
  </div>
</div>
</body>
</html>
