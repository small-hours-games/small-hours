<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; font-family: 'Outfit', sans-serif; color: #e0e0ff; padding: 20px; display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  .token-group { display: flex; flex-direction: column; gap: 6px; }
  .label { font-size: 10px; color: #8888aa; font-family: monospace; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.1em; }
  .spacing-row { display: flex; align-items: center; gap: 8px; }
  .sp-bar { background: linear-gradient(135deg, #b347d9, #4dc9f6); border-radius: 2px; height: 10px; }
  .sp-val { font-size: 10px; color: #8888aa; font-family: monospace; min-width: 30px; }
  .radius-demo { background: rgba(179,71,217,0.15); border: 1px solid rgba(179,71,217,0.3); height: 32px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #8888aa; font-family: monospace; }
</style>
</head>
<body>
  <div class="token-group">
    <div class="label">Spacing Scale</div>
    <div class="spacing-row"><span class="sp-val">4px</span><div class="sp-bar" style="width:4px"></div></div>
    <div class="spacing-row"><span class="sp-val">8px</span><div class="sp-bar" style="width:8px"></div></div>
    <div class="spacing-row"><span class="sp-val">12px</span><div class="sp-bar" style="width:12px"></div></div>
    <div class="spacing-row"><span class="sp-val">16px</span><div class="sp-bar" style="width:16px"></div></div>
    <div class="spacing-row"><span class="sp-val">24px</span><div class="sp-bar" style="width:24px"></div></div>
    <div class="spacing-row"><span class="sp-val">32px</span><div class="sp-bar" style="width:32px"></div></div>
    <div class="spacing-row"><span class="sp-val">40px</span><div class="sp-bar" style="width:40px"></div></div>
    <div class="spacing-row"><span class="sp-val">48px</span><div class="sp-bar" style="width:48px"></div></div>
  </div>
  <div class="token-group" style="min-width:220px">
    <div class="label">Border Radius</div>
    <div class="radius-demo" style="border-radius:8px; width:100px">8px — inputs</div>
    <div class="radius-demo" style="border-radius:12px; width:120px">12px — buttons</div>
    <div class="radius-demo" style="border-radius:16px; width:160px">16px — cards</div>
    <div class="radius-demo" style="border-radius:20px; width:120px">20px — pills</div>
    <div style="display:flex; gap:8px; margin-top:4px">
      <div class="radius-demo" style="border-radius:50%; width:40px; height:40px">50%</div>
      <div style="font-size:10px; color:#8888aa; font-family:monospace; align-self:center">avatars · dots</div>
    </div>
  </div>
</body>
</html>
