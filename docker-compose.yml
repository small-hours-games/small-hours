name: small-hours

services:
  game:
    container_name: small-hours
    build: .
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
