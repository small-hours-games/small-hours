name: quiz-trivia

services:
  quiz:
    build: .
    restart: unless-stopped

    # host networking lets the server see your real LAN IP and
    # generate the correct QR code / player URL automatically.
    # (Linux only — on Mac/Windows remove this and add ports: ["3000:3000"]
    #  then set DOMAIN=<your-ip>:3000 in .env instead)
    network_mode: host

    # Load optional env overrides (DOMAIN, PORT, etc.)
    env_file:
      - path: .env
        required: false

    volumes:
      # Bind-mount source code — git pull on host = instant update, no rebuild needed
      - ./:/app

      # Preserve node_modules from the image build (isolates from host directory)
      - /app/node_modules

      # Data files persisted on host at ./data/ — survives rebuilds and volume wipes
      - ./data:/app/data

      # TLS certs (optional — server falls back to HTTP without them)
      - ./certs:/app/certs:ro

# ── To apply code changes ────────────────────────────────────────────────────
#   git pull && docker restart quiz-trivia-quiz-1
#
# ── To rebuild after package.json changes ───────────────────────────────────
#   docker compose up --build -d
# ────────────────────────────────────────────────────────────────────────────
